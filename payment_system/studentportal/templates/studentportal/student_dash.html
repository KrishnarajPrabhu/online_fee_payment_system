{% extends 'studentportal/student_base.html' %}
{% load static %}
{% block head %}
    <title>Student - Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/student/student_dash.css' %}">
{% endblock %}
{% block content %}
<div class="content">
<h3>Pending Payments</h3>
    <table>
        <thead>
            <tr>
                <th>Sl. No</th>
                <th style="width: 150px; text-align: left; padding-left: 10px">
                    Particulars
                </th>
                <th>Date</th>
                <th style="text-align: right">Amount (INR)</th>
                <th>Pay</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td style="width:150px">S001</td>
                <td style="width: 200px; text-align: left; padding: 0 20px;">Gpay</td>
                <td style="width: 200px;">05-07-2024</td>
                <td style="width: 250px; text-align:right;">14500</td>
                <td style="width: 70px;">
                    <div class="pay-button">
                        <form action="#" method="#">
                            <button type="submit" onclick="return confirm('Are you sure you want to pay the money?')">Pay</button>
                        </form>
                    </div>  
                </td>
            </tr>
        </tbody>
    </table>
</div>

{% endblock %}
